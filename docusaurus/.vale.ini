# Strapi documentation prose checks (12 Rules subset).
# Run: node scripts/style-validation/validate-content-style.js  (from docusaurus/)
#
# validate-content-style.js uses legacy-style-rules.js for easy/casual/simple/pronouns
# (rule-parser parity) and Vale only for InlineEnumerations (5+ items).

StylesPath = styles
MinAlertLevel = suggestion

[formats]
mdx = md

[*.{md,mdx}]
BasedOnStyles = Strapi

# Skip MDX/JSX regions (same intent as rule-parser.js cleanContentFromReactComponents).
TokenIgnores = (?s)<[A-Z][a-zA-Z0-9]*[^>]*/>, (?s)<[A-Z][a-zA-Z0-9]*[^>]*>.*?</[A-Z][a-zA-Z0-9]*>, <Icon[^>]*/>, (?s)\{[^}]*\}, \w+="[^"]*", \w+='[^']*'
