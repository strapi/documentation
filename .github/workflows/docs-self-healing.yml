name: Docs Self-Healing

on:
  schedule:
    - cron: '30 1 * * *' # 1:30 AM UTC daily (after merger repo sync at 1:00)
  workflow_dispatch: # manual trigger for testing

jobs:
  docs-self-healing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout strapi/documentation
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN_PIWI }}

      - name: Checkout strapi/strapi (read-only)
        uses: actions/checkout@v4
        with:
          repository: strapi/strapi
          ref: develop
          path: .strapi-source
          token: ${{ secrets.PAT_TOKEN_PIWI }}
          fetch-depth: 50

      - name: List and filter merged PRs in last 24 hours
        id: check-prs
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN_PIWI }}
        run: |
          echo "Checking for PRs merged into strapi/strapi develop in the last 24h..."
          SINCE=$(date -u -d '24 hours ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-24H '+%Y-%m-%dT%H:%M:%SZ')

          # Fetch all merged PRs with metadata
          gh api search/issues \
            --method GET \
            -f q="repo:strapi/strapi is:pr is:merged base:develop merged:>=$SINCE" \
            -f per_page=50 \
            --jq '.items | [.[] | {number, title, html_url: .pull_request.html_url, labels: [.labels[].name]}]' > /tmp/all-prs.json

          TOTAL=$(jq 'length' /tmp/all-prs.json)
          echo "Found $TOTAL merged PRs in the last 24h"

          # Filter out PRs that never need documentation.
          # Based on analysis of 100+ merged PR titles in strapi/strapi.
          #
          # EXCLUDED: chore(*), test(*), docs:, security: package,
          #           *translation(s), *typo, Remove/Update yarn/README
          #
          # KEPT (Router decides): feat, fix, enhancement, and anything else
          jq '[.[] | select(
            (.title | test("^chore"; "i") | not) and
            (.title | test("^test[:(\\s]"; "i") | not) and
            (.title | test("^docs:"; "i") | not) and
            (.title | test("^security: package"; "i") | not) and
            (.title | test("translation[s]?$"; "i") | not) and
            (.title | test("typo"; "i") | not) and
            (.title | test("^(Remove|Update) (yarn|README)"; "i") | not)
          )]' /tmp/all-prs.json > /tmp/filtered-prs.json

          FILTERED=$(jq 'length' /tmp/filtered-prs.json)
          EXCLUDED=$((TOTAL - FILTERED))
          echo "After title filtering: $FILTERED candidates ($EXCLUDED excluded as chore/CI/deps/test)"

          # Separate PRs with "flag: documentation" label (manually flagged, skip automation)
          jq '[.[] | select(.labels | index("flag: documentation"))]' /tmp/filtered-prs.json > /tmp/flagged-prs.json
          jq '[.[] | select(.labels | index("flag: documentation") | not)]' /tmp/filtered-prs.json > /tmp/unflagged-prs.json
          FLAGGED=$(jq 'length' /tmp/flagged-prs.json)
          mv /tmp/unflagged-prs.json /tmp/filtered-prs.json

          if [ "$FLAGGED" -gt 0 ]; then
            echo "Label filter: $FLAGGED PRs manually flagged for docs, skipping automation"
          fi

          # Check idempotency: remove PRs that already have a doc PR
          # Extract PR numbers already referenced in auto-doc-healing PR bodies
          gh pr list --repo strapi/documentation --label auto-doc-healing --state all \
            --json body --jq '[.[].body | scan("strapi/strapi/pull/([0-9]+)") | .[0] | tonumber] | unique' \
            > /tmp/existing-pr-numbers.json 2>/dev/null || echo "[]" > /tmp/existing-pr-numbers.json

          # Filter out PRs whose number appears in existing doc PRs
          jq --slurpfile existing /tmp/existing-pr-numbers.json \
            '[.[] | select(.number as $n | $existing[0] | index($n) | not)]' \
            /tmp/filtered-prs.json > /tmp/new-prs.json

          ALREADY=$((FILTERED - $(jq 'length' /tmp/new-prs.json)))
          FINAL=$(jq 'length' /tmp/new-prs.json)

          if [ "$ALREADY" -gt 0 ]; then
            echo "Idempotency: $ALREADY PRs already have a doc PR, skipped"
          fi

          echo "Final candidates for Claude: $FINAL"

          # Set outputs based on final filtered list
          if [ "$FINAL" -eq 0 ]; then
            echo "has_prs=false" >> $GITHUB_OUTPUT
          else
            echo "has_prs=true" >> $GITHUB_OUTPUT
          fi

          # Pass the final list to Claude
          {
            echo "pr_list<<PR_LIST_EOF"
            cat /tmp/new-prs.json
            echo "PR_LIST_EOF"
          } >> $GITHUB_OUTPUT

          # Log detailed pre-filtering results in summary
          echo "### Pre-filtering ($TOTAL merged PRs in 24h)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # List excluded PRs (title filter)
          if [ "$EXCLUDED" -gt 0 ]; then
            echo "**Excluded by title filter ($EXCLUDED):**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r --argjson kept "$(jq '[.[].number]' /tmp/filtered-prs.json)" --argjson flagged "$(jq '[.[].number]' /tmp/flagged-prs.json)" \
              '[.[] | select(.number as $n | ($kept | index($n) | not) and ($flagged | index($n) | not))]
              | .[] | "- ~~#\(.number) — \(.title)~~"' /tmp/all-prs.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # List manually flagged PRs
          if [ "$FLAGGED" -gt 0 ]; then
            echo "**Manually flagged for docs ($FLAGGED):**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '.[] | "- #\(.number) — \(.title) *(has `flag: documentation` label, skipping automation)*"' /tmp/flagged-prs.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # List already processed PRs
          if [ "$ALREADY" -gt 0 ]; then
            echo "**Already processed ($ALREADY):**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r --argjson newprs "$(cat /tmp/new-prs.json)" \
              '[.[] | select(.number as $n | $newprs | map(.number) | index($n) | not)]
              | .[] | "- #\(.number) — \(.title) *(doc PR already exists)*"' /tmp/filtered-prs.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # List candidates sent to Claude
          if [ "$FINAL" -gt 0 ]; then
            echo "**Sent to Claude ($FINAL):**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '.[] | "- **#\(.number) — \(.title)**"' /tmp/new-prs.json >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Pre-fetch PR diffs and bodies
        if: steps.check-prs.outputs.has_prs == 'true'
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN_PIWI }}
        run: |
          for NUMBER in $(jq -r '.[].number' /tmp/new-prs.json); do
            echo "Fetching body and diff for PR #$NUMBER..."
            gh api "repos/strapi/strapi/pulls/$NUMBER" --jq '.body' > "/tmp/pr-${NUMBER}-body.txt" 2>/dev/null || echo "" > "/tmp/pr-${NUMBER}-body.txt"
            gh api "repos/strapi/strapi/pulls/$NUMBER.diff" > "/tmp/pr-${NUMBER}.diff" 2>/dev/null || echo "" > "/tmp/pr-${NUMBER}.diff"

            DIFF_LINES=$(wc -l < "/tmp/pr-${NUMBER}.diff")
            echo "  PR #$NUMBER: body $(wc -c < "/tmp/pr-${NUMBER}-body.txt") bytes, diff $DIFF_LINES lines"

            # Flag oversized diffs
            if [ "$DIFF_LINES" -gt 3000 ]; then
              echo "  ⚠️ PR #$NUMBER diff exceeds 3000 lines, will be skipped by Claude"
            fi
          done

      # ── Step 0: Haiku Triage (ultra-light, ~$0.01) ──
      - name: Load Triage prompt
        if: steps.check-prs.outputs.has_prs == 'true'
        id: load-triage-prompt
        run: |
          echo "prompt<<PROMPT_EOF" >> $GITHUB_OUTPUT
          cat .github/prompts/docs-self-healing-triage.md >> $GITHUB_OUTPUT
          echo "PROMPT_EOF" >> $GITHUB_OUTPUT

      - name: Run Triage (Haiku)
        if: steps.check-prs.outputs.has_prs == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_SELF_HEALING_DOCS_API_KEY }}
          github_token: ${{ secrets.PAT_TOKEN_PIWI }}
          prompt: ${{ steps.load-triage-prompt.outputs.prompt }}
          claude_args: '--model claude-haiku-4-5-20251001 --max-turns 10 --allowedTools "Bash,Read"'
          show_full_output: true
        env:
          FILTERED_PRS: ${{ steps.check-prs.outputs.pr_list }}

      - name: Check Triage results
        if: steps.check-prs.outputs.has_prs == 'true'
        id: check-triage
        run: |
          TRIAGE_FILE="/tmp/triage-results.json"
          if [ ! -f "$TRIAGE_FILE" ]; then
            echo "⚠️ Triage did not produce results file — stopping pipeline"
            echo "has_candidates=false" >> $GITHUB_OUTPUT
            echo "**⚠️ Triage (Haiku) failed to produce results. Router was not invoked.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          else
            # Keep only PRs where triage said "yes"
            YES_NUMBERS=$(jq '[.prs[] | select(.triage == "yes") | .number]' "$TRIAGE_FILE")
            jq --argjson yes "$YES_NUMBERS" '[.[] | select(.number as $n | $yes | index($n))]' \
              /tmp/new-prs.json > /tmp/triaged-prs.json

            YES_COUNT=$(jq 'length' /tmp/triaged-prs.json)
            NO_COUNT=$(jq '[.prs[] | select(.triage == "no")] | length' "$TRIAGE_FILE")

            echo "Triage: $YES_COUNT candidates, $NO_COUNT eliminated"

            # Log triage results in summary
            if [ "$NO_COUNT" -gt 0 ]; then
              echo "### Triage (Haiku — title+body only)" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Eliminated ($NO_COUNT):**" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              jq -r '.prs[] | select(.triage == "no") | "- ~~#\(.number) — \(.title)~~ — \(.reason)"' "$TRIAGE_FILE" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
            fi

            if [ "$YES_COUNT" -eq 0 ]; then
              echo "has_candidates=false" >> $GITHUB_OUTPUT
            else
              echo "has_candidates=true" >> $GITHUB_OUTPUT
            fi
          fi

          # Update PR list for Router
          {
            echo "triaged_pr_list<<TRIAGE_EOF"
            cat /tmp/triaged-prs.json
            echo "TRIAGE_EOF"
          } >> $GITHUB_OUTPUT

      # ── Step A: Haiku Router (only for triage "yes" PRs) ──
      - name: Load Router prompt
        if: steps.check-triage.outputs.has_candidates == 'true'
        id: load-router-prompt
        run: |
          echo "prompt<<PROMPT_EOF" >> $GITHUB_OUTPUT
          cat .github/prompts/docs-self-healing-router.md >> $GITHUB_OUTPUT
          echo "PROMPT_EOF" >> $GITHUB_OUTPUT

      - name: Run Router (Haiku)
        if: steps.check-triage.outputs.has_candidates == 'true'
        id: router
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_SELF_HEALING_DOCS_API_KEY }}
          github_token: ${{ secrets.PAT_TOKEN_PIWI }}
          prompt: ${{ steps.load-router-prompt.outputs.prompt }}
          claude_args: '--model claude-haiku-4-5-20251001 --max-turns 20 --allowedTools "Bash,Read,Write,Edit,Glob,Grep"'
          show_full_output: true
        env:
          DOC_REPO: ${{ github.workspace }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN_PIWI }}
          FILTERED_PRS: ${{ steps.check-triage.outputs.triaged_pr_list }}

      - name: Check Router results
        if: steps.check-triage.outputs.has_candidates == 'true'
        id: check-router
        run: |
          RESULTS_FILE="/tmp/router-results.json"
          if [ ! -f "$RESULTS_FILE" ]; then
            echo "Router did not produce results file"
            echo "has_targets=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Count PRs by decision and complexity
          MICRO=$(jq '[.prs[] | select(.decision == "has_targets" and .complexity == "micro")] | length' "$RESULTS_FILE")
          FULL=$(jq '[.prs[] | select(.decision == "has_targets" and .complexity == "full")] | length' "$RESULTS_FILE")
          SKIPPED=$(jq '[.prs[] | select(.decision == "skip")] | length' "$RESULTS_FILE")
          ASK_USER=$(jq '[.prs[] | select(.decision == "ask_user")] | length' "$RESULTS_FILE")
          TARGETS=$((MICRO + FULL))

          echo "Router results: $TARGETS with targets ($MICRO micro, $FULL full), $SKIPPED skipped, $ASK_USER ask_user"

          # Log Router decisions in summary
          echo "### Router decisions (Haiku)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$MICRO" -gt 0 ]; then
            echo "**Micro-edits handled by Haiku ($MICRO):**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '.prs[] | select(.decision == "has_targets" and .complexity == "micro") | "- **#\(.number) — \(.title)**" + (if .doc_pr then " → [\(.doc_pr)](\(.doc_pr))" else "" end)' "$RESULTS_FILE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$FULL" -gt 0 ]; then
            echo "**Full drafting needed — sent to Sonnet ($FULL):**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '.prs[] | select(.decision == "has_targets" and .complexity == "full") | "- **#\(.number) — \(.title)**"' "$RESULTS_FILE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$SKIPPED" -gt 0 ]; then
            echo "**No docs needed ($SKIPPED):**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '.prs[] | select(.decision == "skip") | "- ~~#\(.number) — \(.title)~~ — \(.reason)"' "$RESULTS_FILE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$ASK_USER" -gt 0 ]; then
            echo "**Needs manual review ($ASK_USER):**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '.prs[] | select(.decision == "ask_user") | "- ⚠️ #\(.number) — \(.title) — \(.reason)"' "$RESULTS_FILE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          # Sonnet only needed for "full" complexity PRs
          if [ "$FULL" -eq 0 ]; then
            echo "has_targets=false" >> $GITHUB_OUTPUT
          else
            echo "has_targets=true" >> $GITHUB_OUTPUT
          fi

          # Pass router results to Sonnet (only full-complexity PRs)
          {
            echo "router_results<<ROUTER_EOF"
            cat "$RESULTS_FILE"
            echo "ROUTER_EOF"
          } >> $GITHUB_OUTPUT

      # ── Step B: Sonnet Drafter (only if full-complexity targets found) ──
      - name: Load Drafter prompt
        if: steps.check-router.outputs.has_targets == 'true'
        id: load-drafter-prompt
        run: |
          echo "prompt<<PROMPT_EOF" >> $GITHUB_OUTPUT
          cat .github/prompts/docs-self-healing-drafter.md >> $GITHUB_OUTPUT
          echo "PROMPT_EOF" >> $GITHUB_OUTPUT

      - name: Run Drafter (Sonnet)
        if: steps.check-router.outputs.has_targets == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_SELF_HEALING_DOCS_API_KEY }}
          github_token: ${{ secrets.PAT_TOKEN_PIWI }}
          prompt: ${{ steps.load-drafter-prompt.outputs.prompt }}
          claude_args: '--model claude-sonnet-4-6 --max-turns 25 --allowedTools "Bash,Read,Write,Edit,Glob,Grep"'
          show_full_output: true
        env:
          DOC_REPO: ${{ github.workspace }}
          GH_TOKEN: ${{ secrets.PAT_TOKEN_PIWI }}
          ROUTER_RESULTS: ${{ steps.check-router.outputs.router_results }}

      - name: Summary
        if: always()
        run: |
          echo "## Docs Self-Healing Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Case 1: No PRs passed bash pre-filter
          if [ "${{ steps.check-prs.outputs.has_prs }}" == "false" ]; then
            echo "**Result:** No candidate PRs after pre-filtering. No AI invoked." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Case 2: Triage eliminated all PRs
          if [ "${{ steps.check-triage.outputs.has_candidates }}" != "true" ]; then
            echo "**Result:** Triage (Haiku) eliminated all PRs. Router and Sonnet were not invoked." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Case 3: Router ran but found no targets — Sonnet was NOT invoked
          if [ "${{ steps.check-router.outputs.has_targets }}" != "true" ]; then
            echo "**Result:** Router (Haiku) found no documentation targets. Sonnet was not invoked." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Case 3: Sonnet ran — read its summary
          SUMMARY_FILE="/tmp/self-healing-summary.json"
          if [ ! -f "$SUMMARY_FILE" ]; then
            echo "**Result:** Sonnet ran but no summary file was produced. Check logs." >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          # Drafter results
          echo "### Drafter results (Sonnet)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          PROCESSED=$(jq -r '.processed | length' "$SUMMARY_FILE")
          if [ "$PROCESSED" -gt 0 ]; then
            echo "**Doc PRs created ($PROCESSED):**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '.processed[] | "- [strapi/strapi#\(.number) — \(.title)](\(.doc_pr))"' "$SUMMARY_FILE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          ERRORS=$(jq -r '.errors | length' "$SUMMARY_FILE")
          if [ "$ERRORS" -gt 0 ]; then
            echo "**Errors ($ERRORS):**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '.errors[] | "- ⚠️ strapi/strapi#\(.number) — \(.title): \(.error)"' "$SUMMARY_FILE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
